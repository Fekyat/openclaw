name: Render Image

# Build the Docker image for the Render deployment and push it to GHCR.
#
# Why this exists: Render's free-tier build environment caps RAM (~8GB), which
# is less than OpenClaw's `pnpm build:docker` step needs (the Dockerfile sets
# --max-old-space-size=8192). Building on GitHub Actions (16GB runners) sidesteps
# the OOM, and Render then pulls the prebuilt image for free (no build step).
#
# The image contains NO secrets; all credentials are runtime env vars on Render
# resolved via SecretRefs (see render-config/openclaw.seed.json5). Public GHCR
# visibility is intentional and safe for that reason.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.mdx"
      - ".agents/**"
      - "skills/**"
  workflow_dispatch: # manual rebuild without a push

concurrency:
  group: render-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # github.repository preserves owner case (e.g. "Fekyat/openclaw"), but Docker
  # image names must be lowercase. Lowercase it once here and reuse everywhere.
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04 # 16GB RAM; enough for OpenClaw's build step
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve the lowercase image name. GitHub provides no lowercase repository
      # expression directly, so derive it from github.repository in a step and
      # expose it via GITHUB_OUTPUT for subsequent steps.
      - name: Resolve lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Builder
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Public visibility is set at the package level (package settings page on
      # GitHub). The GITHUB_TOKEN has packages:write, so the first push creates
      # the package under the owner; flip it to public once after the first run.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:main
          # Match the official docker-release.yml extensions so the runtime has
          # the same bundled plugins the prod image ships.
          build-args: |
            OPENCLAW_EXTENSIONS=diagnostics-otel,codex
          cache-from: type=gha,scope=render-image
          cache-to: type=gha,mode=max,scope=render-image
